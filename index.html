<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>StandbyME Slideshow</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      #stage {
        position: fixed;
        inset: 0;
        background: #000;
      }

      .slide {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0;
        transition: opacity 350ms ease-out;
        background: #000;
      }

      .slide.active {
        opacity: 1;
      }

      #status {
        position: fixed;
        left: 20px;
        bottom: 20px;
        color: rgba(255, 255, 255, 0.75);
        font-size: 18px;
        line-height: 1.4;
        z-index: 10;
        display: none;
      }

      #status.show {
        display: block;
      }

      .nav-button {
        position: fixed;
        top: 50%;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 132px;
        border: 0;
        border-radius: 8px;
        padding: 0;
        background: rgba(0, 0, 0, 0.34);
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        font-size: 82px;
        line-height: 1;
        opacity: 0;
        transform: translateY(-50%);
        transition: opacity 180ms ease, background 180ms ease;
        -webkit-tap-highlight-color: transparent;
      }

      .nav-arrow {
        display: block;
        height: 1em;
        line-height: 0.82;
        transform: translateY(-0.03em);
      }

      .nav-button.show,
      .nav-button:hover,
      .nav-button:focus-visible {
        opacity: 1;
      }

      .nav-button:active {
        background: rgba(255, 255, 255, 0.24);
      }

      .nav-button-left {
        left: 24px;
      }

      .nav-button-right {
        right: 24px;
      }

      #indicators {
        position: fixed;
        left: 50%;
        bottom: 24px;
        z-index: 20;
        display: flex;
        gap: 12px;
        justify-content: center;
        max-width: calc(100% - 48px);
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.28);
        opacity: 0.78;
        transform: translateX(-50%);
      }

      .indicator-dot {
        width: 11px;
        height: 11px;
        border: 0;
        border-radius: 999px;
        padding: 0;
        background: rgba(255, 255, 255, 0.42);
      }

      .indicator-dot.active {
        background: rgba(255, 255, 255, 0.95);
      }
    </style>
  </head>

  <body>
    <div id="stage">
      <img
        id="imgA"
        class="slide active"
      />
      <img
        id="imgB"
        class="slide"
      />
    </div>

    <div id="status"></div>
    <button
      id="prevButton"
      class="nav-button nav-button-left"
      type="button"
      aria-label="이전 이미지"
    >
      <span class="nav-arrow">‹</span>
    </button>
    <button
      id="nextButton"
      class="nav-button nav-button-right"
      type="button"
      aria-label="다음 이미지"
    >
      <span class="nav-arrow">›</span>
    </button>
    <div
      id="indicators"
      aria-label="이미지 위치"
    ></div>

    <script>
      const CONFIG = {
        // 사진 넘어가는 시간
        slideSeconds: 30,

        // list.json이 바뀌었는지 다시 확인하는 시간
        refreshMinutes: 10,

        // 상시 운영 안정성을 위한 전체 페이지 새로고침 시간
        pageReloadHours: 6,

        // 이미지 맞춤 방식
        // contain = 전체 이미지 보이게
        // cover = 화면 꽉 채우되 일부 잘릴 수 있음
        fit: "contain",
      };

      const params = new URLSearchParams(window.location.search);
      const screenParam = params.get("screen") || "screen1";
      const screen = screenParam.startsWith("screen") ? screenParam : `screen${screenParam}`;

      const imgA = document.getElementById("imgA");
      const imgB = document.getElementById("imgB");
      const statusEl = document.getElementById("status");
      const prevButton = document.getElementById("prevButton");
      const nextButton = document.getElementById("nextButton");
      const indicatorsEl = document.getElementById("indicators");

      imgA.style.objectFit = CONFIG.fit;
      imgB.style.objectFit = CONFIG.fit;

      let images = [];
      let currentIndex = 0;
      let showingA = true;
      let slideTimer = null;
      let controlsTimer = null;

      function showStatus(message, force = false) {
        statusEl.innerHTML = message;
        statusEl.className = force ? "show" : "";
        console.log(message);
      }

      function getImageUrl(filename) {
        return `screens/${screen}/${filename}`;
      }

      function normalizeList(filenames) {
        if (!Array.isArray(filenames)) {
          return [];
        }

        return filenames
          .filter((filename) => typeof filename === "string")
          .map((filename) => filename.trim())
          .filter((filename) => filename.length > 0)
          .filter((filename) => !filename.includes("..") && !filename.startsWith("/"));
      }

      function renderIndicators() {
        indicatorsEl.innerHTML = "";
        indicatorsEl.style.display = images.length > 1 ? "flex" : "none";

        images.forEach((image, index) => {
          const dot = document.createElement("span");
          dot.className = "indicator-dot";
          dot.setAttribute("aria-hidden", "true");

          if (index === currentIndex) {
            dot.classList.add("active");
          }

          indicatorsEl.appendChild(dot);
        });
      }

      function updateIndicators() {
        [...indicatorsEl.children].forEach((dot, index) => {
          dot.classList.toggle("active", index === currentIndex);
        });
      }

      function showControls() {
        if (images.length <= 1) return;

        prevButton.classList.add("show");
        nextButton.classList.add("show");

        if (controlsTimer) {
          clearTimeout(controlsTimer);
        }

        controlsTimer = setTimeout(() => {
          prevButton.classList.remove("show");
          nextButton.classList.remove("show");
        }, 1800);
      }

      function preloadImages() {
        images.forEach((src) => {
          const image = new Image();
          image.src = src;
        });
      }

      async function loadImageList() {
        try {
          const response = await fetch(`screens/${screen}/list.json?ts=${Date.now()}`, {
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error(`list.json을 불러오지 못함: ${response.status}`);
          }

          const filenames = normalizeList(await response.json());
          const newImages = filenames.map(getImageUrl);

          if (newImages.length === 0) {
            showStatus(`이미지 목록이 비어 있습니다.<br>확인: screens/${screen}/list.json`, true);
            return;
          }

          images = newImages;
          showStatus(`${screen}: ${images.length}개 이미지 로드됨`);
          renderIndicators();
          preloadImages();

          if (!imgA.src && !imgB.src) {
            imgA.src = images[0];
            currentIndex = 0;
            updateIndicators();
          }
        } catch (error) {
          showStatus(`에러 발생<br>${error.message}<br>screen 이름과 list.json 파일 확인`, true);
        }
      }

      function showSlide(index) {
        if (images.length === 0) return;

        currentIndex = (index + images.length) % images.length;
        const nextUrl = images[currentIndex];

        const currentImg = showingA ? imgA : imgB;
        const nextImg = showingA ? imgB : imgA;

        nextImg.onload = () => {
          nextImg.classList.add("active");
          currentImg.classList.remove("active");
          showingA = !showingA;
          updateIndicators();
        };

        nextImg.onerror = () => {
          showStatus(`이미지를 불러오지 못했습니다.<br>${nextUrl}`, true);
        };

        nextImg.src = nextUrl;
      }

      function nextSlide() {
        showSlide(currentIndex + 1);
      }

      function prevSlide() {
        showSlide(currentIndex - 1);
      }

      function resetSlideTimer() {
        if (slideTimer) {
          clearInterval(slideTimer);
        }

        slideTimer = setInterval(nextSlide, CONFIG.slideSeconds * 1000);
      }

      function handleNavClick(direction) {
        if (images.length <= 1) return;

        if (direction === "prev") {
          prevSlide();
        } else {
          nextSlide();
        }

        resetSlideTimer();
        showControls();
      }

      async function start() {
        await loadImageList();

        resetSlideTimer();
        document.addEventListener("pointerdown", showControls);
        document.addEventListener("mousemove", showControls);
        prevButton.addEventListener("click", (event) => {
          event.stopPropagation();
          handleNavClick("prev");
        });
        nextButton.addEventListener("click", (event) => {
          event.stopPropagation();
          handleNavClick("next");
        });
        setInterval(loadImageList, CONFIG.refreshMinutes * 60 * 1000);
        setTimeout(() => {
          window.location.reload();
        }, CONFIG.pageReloadHours * 60 * 60 * 1000);
      }

      start();
    </script>
  </body>
</html>
